<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="contact.css">
        <script>
            function submit(){

                let name=document.getElementById("name").value;
                let email=document.getElementById("email").value;
                let message=document.getElementById("message").value;
                if (name=="" && email=="" && message==""){
                            alert("You should fill the Name ,Email and Message")
                }
                else if (name=="" && email==""){
                            alert("You should fill the Name and Email")
                }
                else if (name=="" && message==""){
                            alert("You should fill the Name and Message")
                }
                else if (email=="" && message==""){
                            alert("You should fill the Email and Message")
                }
                else if (name==""){
                            alert("You should fill the Name")
                }
                else if (email==""){
                            alert("You should fill the Email")
                }
                else if (message==""){
                            alert("You should fill the Message")
                }
                else if (name!="" && email!="" && message!=""){
                    alert("Are you sure: ")
                    let n=prompt("Enter yes or no: ")
                    if (n=="yes"){
                        alert("Message sent")
                    }
                    else if (n=="no"){
                        alert("Message not sent")
                    }
                    else {
                        alert("Error")
                    }
                }
            }
        </script>
    </head>
    <body>
